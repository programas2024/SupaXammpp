services:
  # Base de datos MySQL
  mysql-db:
    image: mysql:8.0
    container_name: supaxampp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mi_app_mysql
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Base de datos PostgreSQL
  postgres-db:
    image: postgres:16
    container_name: supaxampp-postgres
    restart: always
    environment:
      POSTGRES_DB: mi_app_postgres
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mysql_data:
  postgres_data: